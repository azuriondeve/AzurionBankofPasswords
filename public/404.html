<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Acesso Negado | AzurionBank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f12;
            --surface-hover: #16161a;
            --border: #1e1e24;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 120px;
            font-weight: 600;
            line-height: 1;
            background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -8px;
            position: relative;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            filter: blur(40px);
            opacity: 0.2;
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
            z-index: -1;
        }

        .status-badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        h1 span { color: var(--accent); }

        p {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            margin-left: 10px;
        }

        .btn-outline:hover {
            background: var(--surface);
            border-color: var(--text-muted);
            color: var(--text-primary);
            box-shadow: none;
        }

        .vault-icon {
            font-size: 40px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
            opacity: 0.15;
            z-index: -1;
        }

        @media (max-width: 480px) {
            .error-code { font-size: 80px; }
            .btn { width: 100%; justify-content: center; margin-left: 0; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="container">
    <div class="vault-icon">🔒</div>
    <div class="status-badge">Checksum Error: Page Not Found</div>
    <div class="error-code">404</div>
    <h1>Page <span>Non-existent</span></h1>
    <p>The requested address was not found in our encrypted database. The link may have expired or never existed.</p>
    
    <div class="actions">
        <a href="/" class="btn">Back to Top</a>
        <a href="#" class="btn btn-outline" onclick="history.back(); return false;">Previous Page</a>
    </div>
</div>

<script>
    // Efeito sutil de movimento no fundo baseado no mouse
    document.addEventListener('mousemove', (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
        const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
        document.querySelector('.grid-bg').style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
</script>

</body>
</html>
